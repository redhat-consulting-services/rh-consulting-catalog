name: Build and Push Catalog Image on Tag

on:
  push:
    tags:
      # Only fire for plain semver tags created by on_main_push.yaml (e.g. v1.0.4).
      - 'v[0-9]*.[0-9]*.[0-9]*'

env:
  IMAGE_TAG_BASE: quay.io/redhat-consulting-services/rh-consulting-catalog

jobs:
  build-and-push-catalog:
    name: Build FBC catalog image and push to Quay.io
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Extract tag name
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Install opm
        run: |
          OS=$(go env GOOS 2>/dev/null || echo linux)
          ARCH=$(go env GOARCH 2>/dev/null || echo amd64)
          curl -sSLo /usr/local/bin/opm \
            "https://github.com/operator-framework/operator-registry/releases/download/v1.55.0/${OS}-${ARCH}-opm"
          chmod +x /usr/local/bin/opm

      - name: Validate catalog
        run: |
          if [ ! -d catalog ]; then
            echo "::error::No 'catalog' directory found. Nothing to build."
            exit 1
          fi
          opm validate catalog

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_IO_USERNAME }}
          password: ${{ secrets.QUAY_IO_PASSWORD }}

      - name: Build catalog image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: rh-consulting-catalog.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_TAG_BASE }}:${{ steps.tag.outputs.name }}
            ${{ env.IMAGE_TAG_BASE }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.tag.outputs.name }}
